<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris One — Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --coral: #FE4B60;
      --coral-dark: #E53652;
      --navy: #001E3A;
      --bg: #F2F8F3;
      --surface: #FFFFFF;
      --border: #E4E6EA;
      --text: #001E3A;
      --muted: #6B7280;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
    }

    .nav-inner {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--coral);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 18px; height: 18px; }

    .btn-signout {
      display: inline-flex;
      align-items: center;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: var(--muted);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      text-decoration: none;
    }

    .btn-signout:hover {
      color: var(--coral);
      border-color: var(--coral);
    }

    .welcome-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      text-align: center;
    }

    .welcome-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 60px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .welcome-card h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .welcome-card p {
      font-size: 16px;
      color: var(--muted);
    }

    .verify-banner {
      display: none;
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      background: #FFF3CD;
      color: #856404;
      text-align: center;
      padding: 12px 20px;
      font-size: 14px;
      z-index: 99;
      border-bottom: 1px solid #FFEAA7;
    }

    .verify-banner.show { display: block; }

    .verify-banner button {
      background: none;
      border: none;
      color: var(--coral);
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      text-decoration: underline;
      font-family: inherit;
      margin-left: 8px;
    }

    @media (max-width: 640px) {
      .nav-inner { padding: 0 20px; }
      .welcome-card { padding: 40px 24px; }
      .welcome-card h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">
        <span class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </span>
        Polaris One
      </a>
      <button class="btn-signout" id="signout-btn">Sign out</button>
    </div>
  </nav>

  <div class="verify-banner" id="verify-banner">
    Please check your email and verify your account.
    <button id="resend-btn">Resend verification email</button>
  </div>

  <main class="welcome-container">
    <div class="welcome-card">
      <h1 id="welcome-heading">Welcome!</h1>
      <p>Your roadmap is ready. Let's build something great.</p>
    </div>
  </main>

  <script>
    var csrfToken = '';

    async function fetchCsrfToken() {
      try {
        var res = await fetch('/api/auth/csrf-token');
        var data = await res.json();
        csrfToken = data.csrfToken;
      } catch (e) {
        console.error('Failed to fetch CSRF token:', e);
      }
    }

    (async function () {
      await fetchCsrfToken();

      try {
        var res = await fetch('/api/auth/me');
        if (!res.ok) {
          window.location.href = '/';
          return;
        }
        var data = await res.json();
        if (!data.user) {
          window.location.href = '/';
          return;
        }
        document.getElementById('welcome-heading').textContent = 'Welcome, ' + data.user.firstName + '!';

        // Show verification banner if email not verified
        if (!data.user.emailVerified) {
          document.getElementById('verify-banner').classList.add('show');
        }
      } catch (err) {
        window.location.href = '/';
      }
    })();

    document.getElementById('signout-btn').addEventListener('click', async function () {
      await fetch('/api/auth/logout', {
        method: 'POST',
        headers: { 'x-csrf-token': csrfToken }
      });
      window.location.href = '/';
    });

    document.getElementById('resend-btn').addEventListener('click', async function () {
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        var res = await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-csrf-token': csrfToken
          }
        });
        var data = await res.json();
        btn.textContent = data.message || 'Sent! Check your inbox.';
      } catch (e) {
        btn.textContent = 'Failed. Try again.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
